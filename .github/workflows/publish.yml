name: Publish package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# GITHUB_TOKEN needs packages:write to publish to GitHub Packages.
permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Guard: on a tag push, the tag (vX.Y.Z) must match package.json's version.
      - name: Tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag) != package.json version $pkg"
            exit 1
          fi

      # prepublishOnly (tokens:contract + tokens:data) runs automatically.
      # The committed .npmrc reads ${GITHUB_TOKEN} for @npsin-oreo auth.
      - name: Publish
        run: npm publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
