name: Publish package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# GITHUB_TOKEN needs packages:write to publish to GitHub Packages.
permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # registry-url + scope make setup-node WRITE an .npmrc wired to GitHub Packages
      # with //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}. The repo .npmrc is
      # gitignored (not in the CI checkout), so this is what provides publish auth.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@npsin-oreo'
      - run: npm ci

      # Guard: on a tag push, the tag (vX.Y.Z) must match package.json's version.
      - name: Tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag) != package.json version $pkg"
            exit 1
          fi

      # prepublishOnly (tokens:build) runs automatically.
      # setup-node wrote the .npmrc; NODE_AUTH_TOKEN is the token it references.
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
