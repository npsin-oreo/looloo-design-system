name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit

  token-drift:
    name: Token reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Canonical layer: the theme overlays regenerate cleanly, all other tiers are
      # hand-authored, the structure validates, and dist output is byte-identical to
      # the committed golden snapshot (the legacy parity gate was retired with the
      # legacy CSS in v2.0.0).
      - name: Tokens are reproducible, valid, and byte-identical
        run: |
          npm run tokens:theme
          git diff --exit-code tokens/ \
            || { echo "::error::tokens/ drift — run \`npm run tokens:theme\` and commit (all other tiers are hand-authored)"; exit 1; }
          npm run tokens:validate
          npm run tokens:build
          npm run icons:contract
          npm run contracts:build
          git diff --exit-code .designops/ \
            || { echo "::error::designops contract drift — run \`npm run tokens:build && npm run icons:contract && npm run contracts:build\` and commit .designops/"; exit 1; }
          npm run tokens:css-check

  quality-gates:
    name: Quality gates (audits, strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Policy: .designops/audit-gates.md — a gate only becomes strict after
      # it reaches zero. styles + icons hit 0 HIGH in the tokenization/icon
      # phases; contrast gates on AA-large which every live pair passes.
      - name: audits (strict)
        run: |
          npm run audit:styles -- --strict
          npm run audit:icons -- --strict
          npm run tokens:audit -- --strict
          npm run audit:components

  storybook-tests:
    name: Storybook tests (render + a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # Render-smokes every story + runs play functions + axe a11y (error mode).
      # test-storybook runs tokens:build first (globals.css imports dist/tokens/*).
      - name: test-storybook
        run: npm run test-storybook
