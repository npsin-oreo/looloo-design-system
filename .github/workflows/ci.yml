name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit

  token-drift:
    name: Token reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The committed generated files must match what their sources produce.
      # brand.css <- brand.config.json; token-contract.json + primitives.css <- tokens.json.
      - name: Generated token files are reproducible
        run: |
          npm run brand:build
          npm run tokens:contract
          npm run tokens:data
          git diff --exit-code app/brand.css token-contract.json app/primitives.css \
            || { echo "::error::token drift — run \`npm run brand:build && npm run tokens:contract && npm run tokens:data\` and commit the generated files"; exit 1; }
      # v2 canonical layer: regenerated files must match what is committed,
      # structure must validate, and dist output must resolve identically to
      # the legacy CSS (the parity gate that guards the consumer swap).
      - name: v2 tokens are reproducible, valid, and at parity with legacy CSS
        run: |
          npm run tokens:theme
          git diff --exit-code tokens/ \
            || { echo "::error::tokens/ drift — run \`npm run tokens:theme\` and commit (all other tiers are hand-authored)"; exit 1; }
          npm run tokens:validate
          npm run tokens:build
          npm run icons:contract
          npm run contracts:build
          git diff --exit-code .designops/ \
            || { echo "::error::designops contract drift — run \`npm run tokens:build && npm run icons:contract && npm run contracts:build\` and commit .designops/"; exit 1; }
          npm run tokens:css-check
          npm run tokens:diff

  quality-gates:
    name: Quality gates (audits, strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Policy: .designops/audit-gates.md — a gate only becomes strict after
      # it reaches zero. styles + icons hit 0 HIGH in the tokenization/icon
      # phases; contrast gates on AA-large which every live pair passes.
      - name: audits (strict)
        run: |
          npm run audit:styles -- --strict
          npm run audit:icons -- --strict
          npm run tokens:audit -- --strict
          npm run audit:components

  storybook-tests:
    name: Storybook tests (render + a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # Render-smokes every story + runs play functions + axe a11y (error mode).
      # build-storybook's brand:build runs implicitly via the vitest setup importing globals.css.
      - name: test-storybook
        run: npm run test-storybook
